<template>
 <!--
     we are using grid because we want to display the cards in a grid format. 
     Each card will be displayed in a column. We are using slds-size_4-of-12 because we want to display 3 cards in a row. 
     If we use slds-size_6-of-12 then we will get 2 cards in a row and if we use slds-size_12-of-12 then we will get 1 card in a row.
    -->
     
  <div class="slds-grid slds-wrap">

    <template for:each= {listOfRecords} for:item="rec">
      <div key={rec} class="slds-col slds-size_4-of-12">
        <lightning-card title={rec}>
          <p class="slds-p-horizontal_small">Card Body (custom component)</p>


        </lightning-card>
      </div>
    </template>
  </div>
</template>
